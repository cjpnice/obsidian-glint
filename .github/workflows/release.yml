name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          if ! echo "${GITHUB_REF_NAME}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Git tag ${GITHUB_REF_NAME} must use x.y.z SemVer without a v prefix."
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "${VERSION}" ]; then
            echo "Git tag ${GITHUB_REF_NAME} must match manifest.json version ${VERSION}."
            exit 1
          fi

      - name: Build and check release
        run: npm run check:release

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Release ${GITHUB_REF_NAME}"
          gh release upload "${GITHUB_REF_NAME}" main.js manifest.json styles.css --clobber
